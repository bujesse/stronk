services:
  pocketbase:
    build:
      context: .
      dockerfile: docker/pocketbase.Dockerfile
    environment:
      PB_SUPERUSER_EMAIL: ${PB_SUPERUSER_EMAIL:-admin@example.com}
      PB_SUPERUSER_PASSWORD: ${PB_SUPERUSER_PASSWORD:-changeme12345}
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  pocketbase-bootstrap:
    build:
      context: .
      dockerfile: docker/pocketbase-bootstrap.Dockerfile
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      POCKETBASE_INTERNAL_URL: http://pocketbase:8090
      PB_SUPERUSER_EMAIL: ${PB_SUPERUSER_EMAIL:-admin@example.com}
      PB_SUPERUSER_PASSWORD: ${PB_SUPERUSER_PASSWORD:-changeme12345}
    restart: "no"

  stronk:
    build:
      context: .
    depends_on:
      pocketbase-bootstrap:
        condition: service_completed_successfully
    ports:
      - "4173:80"
    environment:
      VITE_POCKETBASE_URL: /pb
    restart: unless-stopped

volumes:
  pocketbase_data:
